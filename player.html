<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent}</style>
</head>
<body>
<script>
var audio = null;
window.addEventListener('message', function(e) {
  if (e.data.action === 'play') {
    if (!audio) {
      audio = new Audio(e.data.src);
      audio.loop = true;
      audio.volume = e.data.volume !== undefined ? e.data.volume : 0.5;
    }
    audio.volume = e.data.volume !== undefined ? e.data.volume : 0.5;
    audio.play();
  }
  if (e.data.action === 'pause') {
    if (audio) audio.pause();
  }
  if (e.data.action === 'volume') {
    if (audio) audio.volume = e.data.volume;
  }
});
</script>
</body>
</html>
