<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent}</style>
</head>
<body>
<script>
var audio = null;
var pendingSrc = null;
var pendingVolume = 0.5;
var unlocked = false;

function unlock() {
    if (unlocked) return;
    unlocked = true;
    if (pendingSrc) {
        startPlay(pendingSrc, pendingVolume);
    }
}

function startPlay(src, vol) {
    if (!audio) {
        audio = new Audio(src);
        audio.loop = true;
        audio.volume = vol;
    }
    audio.volume = vol;
    audio.play().catch(function(){});
}

window.addEventListener('message', function(e) {
    if (e.data.action === 'play') {
        pendingSrc = e.data.src;
        pendingVolume = e.data.volume !== undefined ? e.data.volume : 0.5;
        if (unlocked) {
            startPlay(pendingSrc, pendingVolume);
        }
    }
    if (e.data.action === 'pause') {
        if (audio) audio.pause();
    }
    if (e.data.action === 'volume') {
        pendingVolume = e.data.volume;
        if (audio) audio.volume = e.data.volume;
    }
    if (e.data.action === 'unlock') {
        unlock();
    }
});
</script>
</body>
</html>
