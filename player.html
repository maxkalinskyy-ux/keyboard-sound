<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent}</style>
</head>
<body>
<script>
var audio = null;
var pendingSrc = null;
var pendingVolume = 0.5;

function tryPlay() {
    if (!pendingSrc) return;
    if (!audio) {
        audio = new Audio(pendingSrc);
        audio.loop = true;
        audio.volume = pendingVolume;
    }
    audio.volume = pendingVolume;
    audio.play().catch(function(e){ console.log('play error:', e); });
}

window.addEventListener('message', function(e) {
    if (e.data.action === 'play') {
        pendingSrc = e.data.src;
        pendingVolume = e.data.volume !== undefined ? e.data.volume : 0.5;
        tryPlay();
    }
    if (e.data.action === 'pause') {
        if (audio) audio.pause();
    }
    if (e.data.action === 'volume') {
        pendingVolume = e.data.volume;
        if (audio) audio.volume = e.data.volume;
    }
});
</script>
</body>
</html>
